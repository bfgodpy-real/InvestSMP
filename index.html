<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestSMP | Official Minecraft Server</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --gold: #D4AF37;
            --bright-gold: #FFD700;
            --dark-gold: #996515;
            --glass: rgba(255, 255, 255, 0.03);
            --glow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background: #000;
            background: radial-gradient(circle at 50% 50%, #151515 0%, #000 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* GPU Background */
        #star-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
            transform: translateZ(0); 
        }

        .star {
            position: absolute;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0.4;
            box-shadow: 0 0 5px var(--gold);
        }

        nav {
            position: fixed; top: 0; width: 100%; padding: 20px 50px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            z-index: 1000; border-bottom: 1px solid var(--dark-gold);
        }

        .logo { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.6rem; letter-spacing: 3px; text-shadow: var(--glow); }

        nav ul { display: flex; list-style: none; gap: 30px; }
        nav ul li a { 
            color: #aaa; text-decoration: none; font-size: 0.85rem; font-weight: 700; 
            transition: 0.3s; text-transform: uppercase;
        }
        nav ul li a.active, nav ul li a:hover { color: var(--gold); }

        section {
            display: none; padding: 140px 20px 60px;
            max-width: 1100px; margin: 0 auto; min-height: 100vh;
        }
        section.active { display: block; }

        .hero { text-align: center; }
        .hero h1 { font-family: 'Cinzel', serif; font-size: clamp(3rem, 10vw, 6rem); color: var(--gold); }
        
        .status-badge {
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(0, 255, 0, 0.05); border: 1px solid #0f0;
            padding: 8px 20px; border-radius: 50px; color: #0f0;
            font-weight: 700; margin: 20px 0;
        }

        .ip-card {
            background: var(--glass); border: 1px solid var(--gold);
            padding: 15px 45px; border-radius: 5px; color: var(--bright-gold);
            font-weight: 700; cursor: pointer; transition: 0.3s;
            margin-top: 25px; display: inline-block;
        }
        .ip-card:hover { background: var(--gold); color: black; box-shadow: 0 0 30px var(--gold); }

        .chart-container {
            background: rgba(255,255,255,0.02); border: 1px solid var(--dark-gold);
            border-radius: 15px; padding: 30px; margin-top: 40px;
        }

        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 50px; }
        .shop-card {
            background: linear-gradient(145deg, rgba(20,20,20,1) 0%, rgba(5,5,5,1) 100%);
            border: 1px solid var(--dark-gold); border-radius: 10px; padding: 40px;
            text-align: center; transition: 0.4s;
        }
        .shop-card:hover { border-color: var(--gold); transform: translateY(-10px); }
        .price { font-size: 2.5rem; color: var(--gold); font-weight: 800; display: block; margin: 20px 0; }
        
        .buy-btn {
            background: var(--gold); color: black; border: none; width: 100%;
            padding: 15px; border-radius: 3px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; transition: 0.3s; text-decoration: none; display: block;
        }
        .buy-btn:hover { background: #fff; }

    </style>
</head>
<body>

    <div id="star-container"></div>

    <nav>
        <div class="logo">INVEST SMP</div>
        <ul>
            <li><a href="#" onclick="switchTab('home')" class="active" id="nav-home">Home</a></li>
            <li><a href="#" onclick="switchTab('stats')" id="nav-stats">Stats</a></li>
            <li><a href="#" onclick="switchTab('shop')" id="nav-shop">Shop</a></li>
            <li><a href="#" onclick="switchTab('contact')" id="nav-contact">Contact</a></li>
        </ul>
    </nav>

    <section id="home" class="active">
        <div class="hero">
            <h1>InvestSMP</h1>
            <div class="status-badge">
                <span id="player-count">0</span> Players Online
            </div>
            <br>
            <div class="ip-card" onclick="copyIP()">invest.minekeep.gg</div>
        </div>
    </section>

    <section id="stats">
        <h2 style="font-family: 'Cinzel'; color: var(--gold); text-align: center;">Player Count History</h2>
        <div class="chart-container">
            <canvas id="mainChart"></canvas>
        </div>
    </section>

    <section id="shop">
        <h2 style="font-family: 'Cinzel'; color: var(--gold); text-align: center;">Member Ranks</h2>
        <div class="shop-grid">
            <div class="shop-card">
                <h3>VIP</h3>
                <span class="price">$9.99</span>
                <a href="YOUR_VIP_STRIPE_LINK" class="buy-btn">Purchase</a>
            </div>
            <div class="shop-card">
                <h3>MVP</h3>
                <span class="price">$49.99</span>
                <a href="YOUR_MVP_STRIPE_LINK" class="buy-btn">Purchase</a>
            </div>
        </div>
    </section>

    <section id="contact">
        <div style="text-align: center; border: 1px solid var(--dark-gold); padding: 60px;">
            <h2 style="font-family: 'Cinzel'; color: var(--gold);">Contact</h2>
            <div style="font-size: 1.8rem; color: var(--gold); margin-top: 20px;">admin@investsmp.gg</div>
        </div>
    </section>

    <script>
        const IP = "invest.minekeep.gg";
        let historyData = JSON.parse(localStorage.getItem('is_hist')) || [];
        let activeChart = null;

        function switchTab(target) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(target).classList.add('active');
            document.getElementById('nav-' + target).classList.add('active');
            if(target === 'stats') setTimeout(renderGraph, 100);
            window.scrollTo(0,0);
        }

        function copyIP() {
            navigator.clipboard.writeText(IP).then(() => alert("IP Copied!"));
        }

        async function checkServer() {
            try {
                const res = await fetch(`https://api.mcstatus.io/v2/status/java/${IP}`);
                const data = await res.json();
                const count = data.online ? data.players.online : 0;
                document.getElementById('player-count').textContent = count;

                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                if (historyData.length === 0 || count !== historyData[historyData.length - 1].p) {
                    historyData.push({ t: time, p: count });
                    if(historyData.length > 24) historyData.shift();
                    localStorage.setItem('is_hist', JSON.stringify(historyData));
                    if(document.getElementById('stats').classList.contains('active')) renderGraph();
                }
            } catch(e) {}
        }

        function renderGraph() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(activeChart) activeChart.destroy();
            activeChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: historyData.map(d => d.t),
                    datasets: [{
                        data: historyData.map(d => d.p),
                        borderColor: '#D4AF37',
                        tension: 0.3,
                        fill: true,
                        backgroundColor: 'rgba(212, 175, 55, 0.05)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { color: '#D4AF37' } }, x: { ticks: { color: '#666' } } }
                }
            });
        }

        // Stars
        const stars = document.getElementById('star-container');
        for (let i = 0; i < 50; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.width = s.style.height = (Math.random() * 2 + 1) + 'px';
            s.style.top = Math.random() * 100 + 'vh';
            s.style.left = Math.random() * 100 + 'vw';
            stars.appendChild(s);
        }

        setInterval(checkServer, 30000);
        checkServer();
    </script>
</body>
</html>
